<div class="modal-backdrop" (click)="onBackdropClick($event)" role="presentation">
  <div
    class="modal"
    role="dialog"
    aria-modal="true"
    aria-labelledby="modal-title"
  >
    <button class="modal__close" (click)="onCancel()" aria-label="Cerrar modal">
      &#x2715;
    </button>

    <div class="modal__header">
      <h2 class="modal__title" id="modal-title">Confirmar suscripción</h2>
      <span
        class="modal__category"
        [class.modal__category--fic]="fund().category === 'FIC'"
      >
        {{ fund().category }}
      </span>
    </div>

    <div class="modal__fund-info">
      <p class="modal__fund-name">{{ fund().name }}</p>
      <div class="modal__amount-row">
        <span class="modal__amount-label">Monto a invertir:</span>
        <strong class="modal__amount-value">{{ fund().minimumAmount | cop }}</strong>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="confirm()">
      <fieldset class="modal__fieldset">
        <legend class="modal__legend">Método de notificación</legend>

        <label class="modal__option">
          <input type="radio" formControlName="notificationMethod" value="email" />
          <div class="modal__option-content">
            <span class="modal__option-icon" aria-hidden="true">✉️</span>
            <div class="modal__option-text">
              <span class="modal__option-label">Correo electrónico</span>
              <span class="modal__option-desc">Recibirás confirmación en tu email</span>
            </div>
          </div>
          <span class="modal__option-check" aria-hidden="true"></span>
        </label>

        <label class="modal__option">
          <input type="radio" formControlName="notificationMethod" value="sms" />
          <div class="modal__option-content">
            <span class="modal__option-icon" aria-hidden="true">📱</span>
            <div class="modal__option-text">
              <span class="modal__option-label">SMS</span>
              <span class="modal__option-desc">Recibirás confirmación por mensaje de texto</span>
            </div>
          </div>
          <span class="modal__option-check" aria-hidden="true"></span>
        </label>
      </fieldset>

      <div class="modal__actions">
        <button type="button" class="btn btn--secondary" (click)="onCancel()">
          Cancelar
        </button>
        <button type="submit" class="btn btn--primary" [disabled]="form.invalid">
          Confirmar suscripción
        </button>
      </div>
    </form>
  </div>
</div>
